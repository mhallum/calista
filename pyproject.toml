[project]
name = "calista"
version = "0.1.0"
description = "CALISTA: A Traceable Pipeline for CCD Photometry and Spectroscopy"
authors = [
    {name = "mhallum",email = "mkhallum92@gmail.com"}
]
license = {text = "MIT"}
readme = "README.md"
packages = [{ include = "calista", from = "src" }]
requires-python = ">=3.13"
dependencies = [
    "click (>=8.2.1,<9.0.0)",
    "rich (>=14.1.0,<15.0.0)",
    "sqlalchemy (>=2.0.42,<3.0.0)",
    "rich-click (>=1.8.9,<2.0.0)",
    "click-extra (==5.0.2)"
]

[project.scripts]
calista = "calista.cli.main:calista"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.group.dev.dependencies]
pytest = "^8.4.1"
pylint = "^3.3.8"
ruff = "^0.12.8"
mypy = "^1.17.1"
pre-commit = "^4.3.0"
pytest-cov = "^6.2.1"


[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
